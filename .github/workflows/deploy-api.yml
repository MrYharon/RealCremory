name: Deploy API to Azure

on:
  push:
    branches: [master]
    paths:
      - 'Cremory.API/**'
      - 'Cremory.Shared/**'
      - '.github/workflows/deploy-api.yml'

env:
  AZURE_WEBAPP_NAME: cremory-api-bhfhhab9fsfeazcb
  DOTNET_VERSION: '8.0'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Cremory.API/Cremory.API.csproj

      - name: Build
        run: dotnet build Cremory.API/Cremory.API.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Cremory.API/Cremory.API.csproj --configuration Release --no-build --output ./publish

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
