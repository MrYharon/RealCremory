name: Deploy API to Azure

on:
  push:
    branches: [master]
    paths:
      - 'Cremory.API/**'
      - 'Cremory.Shared/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build
        run: dotnet build Cremory.API/Cremory.API.csproj -f net8.0 --configuration Release

      - name: Publish
        run: dotnet publish Cremory.API/Cremory.API.csproj -f net8.0 -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7209C15B7D8B491498643018BAF59707 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3882FE6235C84B00AEAA7EF62C3E5BE1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F920093B07844DB98E458C641F4525C5 }}

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cremory-api'
          slot-name: 'Production'
          package: .
